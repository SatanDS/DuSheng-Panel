components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: User access or refresh JWT.
    AgentBearerAuth:
      type: http
      scheme: bearer
      description: Node token returned by agent registration.

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 25
    Search:
      name: q
      in: query
      required: false
      schema:
        type: string
    Status:
      name: status
      in: query
      required: false
      schema:
        type: string
    UserId:
      name: userId
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    TenantId:
      name: tenantId
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    TunnelId:
      name: tunnelId
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    DeviceGroupId:
      name: deviceGroupId
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    NodeId:
      name: nodeId
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    RuleId:
      name: ruleId
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    DateFrom:
      name: dateFrom
      in: query
      required: false
      schema:
        type: string
        format: date-time
    DateTo:
      name: dateTo
      in: query
      required: false
      schema:
        type: string
        format: date-time
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 200

  requestBodies:
    DeviceGroupWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DeviceGroupWrite"
    LineProviderWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LineProviderWrite"
    LineSiteWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LineSiteWrite"
    LineCircuitWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LineCircuitWrite"
    LineEndpointWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LineEndpointWrite"
    LineProbeWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LineProbeWrite"
    TunnelWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TunnelWrite"
    ProtocolPolicyWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProtocolPolicyWrite"
    SpeedLimitWrite:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SpeedLimitWrite"

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated principal is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NoContent:
      description: Resource deleted.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    HealthResponse:
      type: object
      required: [status, time]
      properties:
        status:
          type: string
          const: ok
        time:
          type: string
          format: date-time

    BaseModel:
      type: object
      required: [id, createdAt, updatedAt]
      properties:
        id:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PageMeta:
      type: object
      required: [items, total, page, pageSize]
      properties:
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
