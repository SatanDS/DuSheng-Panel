      properties:
        tenantId: { type: integer, minimum: 1 }
        tunnelId: { type: integer, minimum: 1 }
        forwardLimit: { type: integer, minimum: 0 }
        portStart: { type: integer, minimum: 0, maximum: 65535 }
        portEnd: { type: integer, minimum: 0, maximum: 65535 }

    TenantTrafficHourlyBucket:
