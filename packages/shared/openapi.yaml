        trafficLimitBytes: { type: integer, format: int64, minimum: 0 }
        forwardLimit: { type: integer, minimum: 0 }
        userLimit: { type: integer, minimum: 0 }
        resetIntervalDays: { type: integer, minimum: 0, maximum: 3660 }
        expiresAt: { type: [string, "null"], format: date-time }
        notes: { type: string }

    TenantTunnelGrant:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/TenantTunnelGrantWrite"

    TenantTunnelGrantWrite:
