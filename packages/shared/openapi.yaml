openapi: 3.1.0
info:
  title: DuSheng Panel API
  version: 0.1.0
  description: >
    REST contract for DuSheng Panel. The API manages users, device groups,
    nodes, tunnels, forwarding rules, protocol policies, install tokens,
    traffic samples, audit logs, and node-agent synchronization.
servers:
  - url: http://127.0.0.1:18888
    description: Local API server
  - url: https://panel.example.com
    description: Production reverse proxy
tags:
  - name: System
  - name: Auth
  - name: User
  - name: Tenant
  - name: Admin
  - name: Agent
paths:
  /healthz:
    get:
      tags: [System]
      operationId: getHealthz
      summary: Health check
      security: []
      responses:
        "200":
          description: API process is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: API process is running but its database is unavailable.

  /metrics:
    get:
      tags: [System]
      operationId: getPrometheusMetrics
      summary: Internal Prometheus metrics endpoint
      description: Aggregate, low-cardinality metrics. The default Caddy configuration does not expose this route publicly.
      security: []
      responses:
        "200":
          description: Prometheus text exposition.
          content:
            text/plain:
              schema: { type: string }

  /install-agent.sh:
    get:
      tags: [System]
      operationId: getInstallAgentScript
      summary: Download the node-agent install script
      security: []
      responses:
        "200":
          description: POSIX shell installer.
          content:
            text/x-shellscript:
              schema:
                type: string

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Create access and refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshAccessToken
      summary: Exchange a bearer refresh token for a new access token
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Access token refreshed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me:
    get:
      tags: [User]
      operationId: getMe
      summary: Get the current user profile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/dashboard:
    get:
      tags: [User]
      operationId: getDashboard
      summary: Get dashboard counters and recent activity
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Dashboard summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/tenant:
    get:
      tags: [Tenant]
      operationId: getCurrentTenant
      summary: Get the tenant assigned to the current tenant administrator
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Current tenant.
          content: { application/json: { schema: { $ref: "#/components/schemas/Tenant" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/tenant/traffic:
    get:
      tags: [Tenant]
      operationId: getCurrentTenantTraffic
      summary: Get the current tenant usage and hourly trend
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Tenant usage and traffic buckets.
          content: { application/json: { schema: { $ref: "#/components/schemas/TenantTrafficResponse" } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/tenants:
    get:
      tags: [Admin]
      operationId: listTenants
      summary: List tenants
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Tenant page.
          content: { application/json: { schema: { $ref: "#/components/schemas/TenantPage" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Admin]
      operationId: createTenant
      summary: Create a tenant
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TenantWrite" } } }
      responses:
        "201":
          description: Tenant created.
          content: { application/json: { schema: { $ref: "#/components/schemas/Tenant" } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/tenants/{id}:
    put:
      tags: [Admin]
      operationId: updateTenant
      summary: Replace a tenant
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TenantWrite" } } }
      responses:
        "200":
          description: Tenant updated.
          content: { application/json: { schema: { $ref: "#/components/schemas/Tenant" } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Admin]
      operationId: deleteTenant
      summary: Delete an unreferenced tenant
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/tenants/{id}/traffic:
    get:
      tags: [Admin]
      operationId: getTenantTraffic
      summary: Get tenant usage and hourly trend
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Tenant usage and traffic buckets.
          content: { application/json: { schema: { $ref: "#/components/schemas/TenantTrafficResponse" } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/tenants/{id}/traffic/reset:
    post:
      tags: [Admin]
      operationId: resetTenantTraffic
      summary: Reset the tenant billing period usage
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: Reset tenant.
          content: { application/json: { schema: { $ref: "#/components/schemas/Tenant" } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/tenant-tunnel-grants:
    get:
      tags: [Admin]
      operationId: listTenantTunnelGrants
      summary: List tenant tunnel grants
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/TunnelId"
      responses:
        "200":
          description: Grant page.
          content: { application/json: { schema: { $ref: "#/components/schemas/TenantTunnelGrantPage" } } }
    post:
      tags: [Admin]
      operationId: createTenantTunnelGrant
      summary: Grant a tenant access to a tunnel and optional port range
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TenantTunnelGrantWrite" } } }
      responses:
        "201":
          description: Grant created.
          content: { application/json: { schema: { $ref: "#/components/schemas/TenantTunnelGrant" } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/tenant-tunnel-grants/{id}:
    put:
      tags: [Admin]
      operationId: updateTenantTunnelGrant
      summary: Replace a tenant tunnel grant
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TenantTunnelGrantWrite" } } }
      responses:
        "200":
          description: Grant updated.
          content: { application/json: { schema: { $ref: "#/components/schemas/TenantTunnelGrant" } } }
        "400": { $ref: "#/components/responses/BadRequest" }
    delete:
      tags: [Admin]
      operationId: deleteTenantTunnelGrant
      summary: Delete an unused tenant tunnel grant
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/forward-rules:
    get:
      tags: [User]
      operationId: listForwardRules
      summary: List forwarding rules visible to the current user
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/TunnelId"
        - $ref: "#/components/parameters/RuleId"
      responses:
        "200":
          description: Forwarding rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForwardRulePage"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [User]
      operationId: createForwardRule
      summary: Create a forwarding rule
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForwardRuleWrite"
      responses:
        "201":
          description: Forwarding rule created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForwardRule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/forward-rules/batch/preview:
    post:
      tags: [User]
      operationId: previewForwardRuleBatch
      summary: Validate and allocate ports for a rule batch without committing
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ForwardRuleBatchWrite" } } }
      responses:
        "200":
          description: Batch preview.
          content: { application/json: { schema: { $ref: "#/components/schemas/ForwardRuleBatchResponse" } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/forward-rules/batch:
    post:
      tags: [User]
      operationId: createForwardRuleBatch
      summary: Atomically create up to 100 forwarding rules
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ForwardRuleBatchWrite" } } }
      responses:
        "201":
          description: Batch created.
          content: { application/json: { schema: { $ref: "#/components/schemas/ForwardRuleBatchResponse" } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/forward-rules/{id}:
    put:
      tags: [User]
      operationId: updateForwardRule
      summary: Replace a forwarding rule
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForwardRuleWrite"
      responses:
        "200":
          description: Forwarding rule updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForwardRule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [User]
      operationId: deleteForwardRule
      summary: Delete a forwarding rule
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/users:
    get:
      tags: [Admin]
      operationId: listUsers
      summary: List users
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Admin]
      operationId: createUser
      summary: Create a user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/users/{id}:
    put:
      tags: [Admin]
      operationId: updateUser
      summary: Update a user
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Admin]
      operationId: deleteUser
      summary: Delete a user
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/users/{id}/traffic/reset:
    post:
      tags: [Tenant]
      operationId: resetUserTraffic
      summary: Reset a user traffic counter and restore eligible rules
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: User with reset usage.
          content: { application/json: { schema: { $ref: "#/components/schemas/User" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/device-groups:
    get:
      tags: [Admin]
      operationId: listDeviceGroups
      summary: List device groups
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: Device groups.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceGroupPage"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Admin]
      operationId: createDeviceGroup
      summary: Create a device group
      security:
        - BearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/DeviceGroupWrite"
      responses:
        "201":
          description: Device group created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceGroup"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/device-groups/{id}:
    put:
      tags: [Admin]
      operationId: updateDeviceGroup
      summary: Replace a device group
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        $ref: "#/components/requestBodies/DeviceGroupWrite"
      responses:
        "200":
          description: Device group updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceGroup"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Admin]
      operationId: deleteDeviceGroup
      summary: Delete a device group
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/line-providers:
    get:
      tags: [Admin]
      operationId: listLineProviders
      summary: List IEPL/IPLC providers
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
      responses:
        "200": { description: Line providers, content: { application/json: { schema: { $ref: "#/components/schemas/LineProviderPage" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Admin]
      operationId: createLineProvider
      summary: Create a line provider
      security: [{ BearerAuth: [] }]
      requestBody: { $ref: "#/components/requestBodies/LineProviderWrite" }
      responses:
        "201": { description: Line provider created, content: { application/json: { schema: { $ref: "#/components/schemas/LineProvider" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/line-providers/{id}:
    put:
      tags: [Admin]
      operationId: updateLineProvider
      summary: Update a line provider
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/LineProviderWrite" }
      responses:
        "200": { description: Line provider updated, content: { application/json: { schema: { $ref: "#/components/schemas/LineProvider" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Admin]
      operationId: deleteLineProvider
      summary: Delete an unused line provider
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/line-sites:
    get:
      tags: [Admin]
      operationId: listLineSites
      summary: List line endpoint sites
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
      responses:
        "200": { description: Line sites, content: { application/json: { schema: { $ref: "#/components/schemas/LineSitePage" } } } }
    post:
      tags: [Admin]
      operationId: createLineSite
      summary: Create a line site
      security: [{ BearerAuth: [] }]
      requestBody: { $ref: "#/components/requestBodies/LineSiteWrite" }
      responses:
        "201": { description: Line site created, content: { application/json: { schema: { $ref: "#/components/schemas/LineSite" } } } }

  /api/v1/line-sites/{id}:
    put:
      tags: [Admin]
      operationId: updateLineSite
      summary: Update a line site
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/LineSiteWrite" }
      responses:
        "200": { description: Line site updated, content: { application/json: { schema: { $ref: "#/components/schemas/LineSite" } } } }
    delete:
      tags: [Admin]
      operationId: deleteLineSite
      summary: Delete an unused line site
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/line-circuits:
    get:
      tags: [Admin]
      operationId: listLineCircuits
      summary: List physical IEPL/IPLC circuits
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
      responses:
        "200": { description: Line circuits, content: { application/json: { schema: { $ref: "#/components/schemas/LineCircuitPage" } } } }
    post:
      tags: [Admin]
      operationId: createLineCircuit
      summary: Create a physical line circuit
      security: [{ BearerAuth: [] }]
      requestBody: { $ref: "#/components/requestBodies/LineCircuitWrite" }
      responses:
        "201": { description: Line circuit created, content: { application/json: { schema: { $ref: "#/components/schemas/LineCircuit" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/line-circuits/{id}:
    put:
      tags: [Admin]
      operationId: updateLineCircuit
      summary: Update a physical line circuit
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/LineCircuitWrite" }
      responses:
        "200": { description: Line circuit updated, content: { application/json: { schema: { $ref: "#/components/schemas/LineCircuit" } } } }
    delete:
      tags: [Admin]
      operationId: deleteLineCircuit
      summary: Delete an unused line circuit
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "204": { $ref: "#/components/responses/NoContent" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/line-endpoints:
    get:
      tags: [Admin]
      operationId: listLineEndpoints
      summary: List A/Z line endpoints
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Search"
      responses:
        "200": { description: Line endpoints, content: { application/json: { schema: { $ref: "#/components/schemas/LineEndpointPage" } } } }
    post:
      tags: [Admin]
      operationId: createLineEndpoint
      summary: Create an A or Z endpoint
      security: [{ BearerAuth: [] }]
      requestBody: { $ref: "#/components/requestBodies/LineEndpointWrite" }
      responses:
        "201": { description: Line endpoint created, content: { application/json: { schema: { $ref: "#/components/schemas/LineEndpoint" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/v1/line-endpoints/{id}:
    put:
      tags: [Admin]
      operationId: updateLineEndpoint
      summary: Update an A or Z endpoint
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody: { $ref: "#/components/requestBodies/LineEndpointWrite" }
      responses:
