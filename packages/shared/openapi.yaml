            inBytes: { type: integer, format: int64, minimum: 0 }
            outBytes: { type: integer, format: int64, minimum: 0 }
            billedBytes: { type: integer, format: int64, minimum: 0 }

    TenantTrafficResponse:
      type: object
      required: [tenant, buckets]
      properties:
        tenant: { $ref: "#/components/schemas/Tenant" }
        buckets: { $ref: "#/components/schemas/TenantTrafficHourlyBucketPage" }

    User:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [username, role, status, flowLimitBytes, usedBytes, forwardLimit]
          properties:
            tenantId:
              type: [integer, "null"]
              minimum: 1
            username:
              type: string
              maxLength: 80
            displayName:
              type: string
              maxLength: 120
            role:
              $ref: "#/components/schemas/UserRole"
            status:
              $ref: "#/components/schemas/UserStatus"
            flowLimitBytes:
              type: integer
              minimum: 0
              format: int64
            usedBytes:
              type: integer
              minimum: 0
              format: int64
            forwardLimit:
              type: integer
              minimum: 0
            expiresAt:
              type: [string, "null"]
              format: date-time

    UserCreate:
      type: object
      required: [username, password]
      properties:
        tenantId:
          type: [integer, "null"]
          minimum: 1
        username:
          type: string
          minLength: 1
          maxLength: 80
        displayName:
          type: string
          maxLength: 120
        password:
          type: string
          minLength: 1
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        flowLimitBytes:
          type: integer
          minimum: 0
          format: int64
        forwardLimit:
          type: integer
          minimum: 0
        expiresAt:
          type: [string, "null"]
          format: date-time

    UserUpdate:
      type: object
      properties:
        tenantId:
          type: [integer, "null"]
          minimum: 1
        username:
          type: string
          minLength: 1
          maxLength: 80
        displayName:
          type: string
          maxLength: 120
        password:
          type: string
          minLength: 1
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        flowLimitBytes:
          type: integer
          minimum: 0
          format: int64
        forwardLimit:
          type: integer
          minimum: 0
        expiresAt:
          type: [string, "null"]
          format: date-time

    UserRole:
      type: string
      enum: [admin, tenant_admin, user]

    UserStatus:
      type: string
      enum: [active, disabled, suspended]

    DeviceGroup:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/DeviceGroupWrite"

    DeviceGroupWrite:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        role:
          type: string
          enum: [entry, exit, relay]
        bindIPs:
          type: string
          description: Comma separated bind IP list or empty for default bind.
          maxLength: 255
        portStart:
          type: integer
          minimum: 0
          maximum: 65535
        portEnd:
          type: integer
          minimum: 0
          maximum: 65535
        trafficRatio:
          type: number
          minimum: 0
          default: 1
        protocolPolicyId:
          type: [integer, "null"]
          minimum: 1
        failoverGroupId:
          type: [integer, "null"]
          minimum: 1
        advancedJson:
          type: string
          description: Raw JSON string reserved for agent-specific options.

    LineProvider:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/LineProviderWrite"

    LineProviderWrite:
      type: object
      required: [name, status]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        code: { type: string, maxLength: 60 }
        status: { type: string, enum: [active, inactive, suspended] }
        supportContact: { type: string, maxLength: 120 }
        supportPhone: { type: string, maxLength: 80 }
        supportEmail: { type: string, maxLength: 160 }
        portalUrl: { type: string, format: uri, maxLength: 255 }
        notes: { type: string }

    LineProbe:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/LineProbeWrite"
        - type: object
          required: [revision, status, lastLatencyMs, consecutiveFailures]
          properties:
            revision: { type: integer, format: int64 }
            status: { type: string, enum: [pending, up, down] }
            lastLatencyMs: { type: number, minimum: 0 }
            lastError: { type: string }
            lastCheckedAt: { type: [string, "null"], format: date-time }
            consecutiveFailures: { type: integer, minimum: 0 }

    LineProbeWrite:
      type: object
      required: [circuitId, nodeId, name, type, target]
      properties:
        circuitId: { type: integer, minimum: 1 }
        nodeId:
          type: integer
          minimum: 1
          description: The selected node must advertise the line_probe_v1 capability.
        name: { type: string, minLength: 1, maxLength: 120 }
        type: { type: string, enum: [tcp, http, udp_echo] }
        target: { type: string, minLength: 1, maxLength: 255 }
        payload: { type: string }
        intervalSeconds: { type: integer, minimum: 5, maximum: 3600, default: 30 }
        timeoutMs: { type: integer, minimum: 100, maximum: 30000, default: 3000 }
        enabled: { type: boolean, default: true }

    LineProbeSample:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [probeId, circuitId, nodeId, success, latencyMs, checkedAt]
          properties:
            probeId: { type: integer, minimum: 1 }
            circuitId: { type: integer, minimum: 1 }
            nodeId: { type: integer, minimum: 1 }
            success: { type: boolean }
            latencyMs: { type: number, minimum: 0 }
            error: { type: string }
            checkedAt: { type: string, format: date-time }

    LineSite:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/LineSiteWrite"

    LineSiteWrite:
      type: object
      required: [name, status]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        code: { type: string, maxLength: 60 }
        status: { type: string, enum: [planned, active, maintenance, retired] }
        country: { type: string, maxLength: 80 }
        region: { type: string, maxLength: 120 }
        city: { type: string, maxLength: 120 }
        address: { type: string, maxLength: 255 }
        notes: { type: string }

    LineCircuit:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/LineCircuitWrite"

    LineCircuitWrite:
      type: object
      required: [providerId, name, serviceType, status]
      properties:
        providerId: { type: integer, minimum: 1 }
        name: { type: string, minLength: 1, maxLength: 120 }
        circuitCode: { type: string, maxLength: 100 }
        serviceType: { type: string, enum: [iepl, iplc, mpls, internet, custom] }
        status: { type: string, enum: [planned, provisioning, active, maintenance, suspended, terminated] }
        bandwidthMbps: { type: integer, minimum: 0 }
        committedMbps: { type: integer, minimum: 0 }
        latencySlaMs: { type: number, minimum: 0 }
        packetLossSlaPct: { type: number, minimum: 0, maximum: 100 }
        monthlyCost: { type: number, minimum: 0 }
        currency: { type: string, maxLength: 10 }
        startsAt: { type: [string, "null"], format: date-time }
        expiresAt: { type: [string, "null"], format: date-time }
        maintenanceStart: { type: [string, "null"], format: date-time }
        maintenanceEnd: { type: [string, "null"], format: date-time }
        tags: { type: string }
        notes: { type: string }

    LineEndpoint:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/LineEndpointWrite"

    LineEndpointWrite:
      type: object
      required: [circuitId, side]
      properties:
        circuitId: { type: integer, minimum: 1 }
        side: { type: string, enum: [a, z] }
        siteId: { type: [integer, "null"], minimum: 1 }
        deviceGroupId: { type: [integer, "null"], minimum: 1 }
        address: { type: string, maxLength: 255 }
        interface: { type: string, maxLength: 120 }
        vlan: { type: integer, minimum: 0, maximum: 4094 }
        ipCidrs: { type: string, description: Newline-separated normalized IP addresses or CIDR prefixes. }
        notes: { type: string }

    Node:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required:
            - deviceGroupId
            - name
            - uuid
            - status
            - appliedRevision
            - desiredRevision
          properties:
            deviceGroupId:
              type: integer
              minimum: 1
            name:
              type: string
              maxLength: 120
            uuid:
              type: string
              maxLength: 80
            status:
              type: string
              enum: [online, offline, disabled, maintenance, uninstalling, uninstall_legacy, uninstall_timeout, uninstall_failed]
            version:
              type: string
              maxLength: 80
            capabilities:
              type: array
              items:
                type: string
            publicIp:
              type: string
              maxLength: 80
            connectHost:
              type: string
              maxLength: 160
            lastSeenAt:
              type: [string, "null"]
              format: date-time
            systemJson:
              type: string
            appliedRevision:
              type: integer
              format: int64
            desiredRevision:
              type: integer
              format: int64
            lastGoodRevision:
              type: integer
              format: int64
            configAckRevision:
              type: integer
              format: int64
            configNonce:
              type: string
            configStatus:
              type: string
              enum: [applied, rejected, rolled_back, lease_expired]
            configMessage:
              type: string
            configAckAt:
              type: [string, "null"]
              format: date-time
            uninstallRequestedAt:
              type: [string, "null"]
              format: date-time
            uninstallConfirmedAt:
              type: [string, "null"]
              format: date-time
            uninstallCommandId:
              type: string
            uninstallAckStatus:
              type: string
              description: Latest uninstall acknowledgement (`accepted`, `done`, `failed`, `timeout`, or legacy compatibility recovery).
            uninstallAckMessage:
              type: string
            uninstallAckAt:
              type: [string, "null"]
              format: date-time
            uninstallLegacy:
              type: boolean
              description: The installed agent cannot confirm that system cleanup completed.

    NodeUpdate:
      type: object
      properties:
        deviceGroupId:
          type: integer
          minimum: 1
        name:
          type: string
          maxLength: 120
        status:
          type: string
          enum: [online, offline, disabled, maintenance, uninstalling, uninstall_legacy, uninstall_timeout, uninstall_failed]
        connectHost:
          type: string
          maxLength: 160

    Tunnel:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/TunnelWrite"

    TunnelWrite:
      type: object
      required: [name, mode, entryGroupId, protocol, flowAccounting]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        mode:
          type: string
          enum: [single, relay, failover]
        entryGroupId:
          type: integer
          minimum: 1
        exitGroupId:
          type: [integer, "null"]
          minimum: 1
        protocol:
          type: string
          description: Transport profile used by the agent supervisor.
          enum: [direct, tcp, udp, ws, wss, tls, quic, relay]
        flowAccounting:
          type: string
          enum: [single, entry, exit, both]
        entryTrafficRatio:
          type: number
          minimum: 0
          default: 1
        exitTrafficRatio:
          type: number
          minimum: 0
          default: 1
        protocolPolicyId:
          type: [integer, "null"]
          minimum: 1
        lineCircuitId:
          type: [integer, "null"]
          minimum: 1
        advancedJson:
          type: string

    ForwardRule:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/ForwardRuleWrite"
        - type: object
          required: [status, inBytes, outBytes, revision, violationCount]
          properties:
            tenantId:
              type: [integer, "null"]
              minimum: 1
            status:
              $ref: "#/components/schemas/ForwardRuleStatus"
            inBytes:
              type: integer
              minimum: 0
              format: int64
            outBytes:
              type: integer
              minimum: 0
              format: int64
            revision:
              type: integer
              format: int64
            lastSyncError:
              type: string
            quotaSource:
              type: string
              enum: ["", user, tenant]
            violationCount:
              type: integer
              minimum: 0

    ForwardRuleWrite:
      type: object
      required: [tunnelId, name, protocol, remoteHost, remotePort]
      properties:
        userId:
          type: integer
          minimum: 1
          description: Required for admin callers; non-admin callers are forced to their own user ID.
        tunnelId:
          type: integer
          minimum: 1
        name:
          type: string
          minLength: 1
          maxLength: 120
        protocol:
          $ref: "#/components/schemas/ForwardRuleProtocol"
        listenPort:
          type: integer
          minimum: 0
          maximum: 65535
          description: Zero or omitted asks the API to allocate a port from the tunnel entry group.
        remoteHost:
          type: string
          minLength: 1
          maxLength: 255
        remotePort:
          type: integer
          minimum: 1
          maximum: 65535
        strategy:
          type: string
          enum: [least_conn, round_robin, random, source_hash]
          default: least_conn
        status:
          type: string
          enum: [active, paused, disabled]
          description: active requests a resync; quota_exhausted is a system-managed status.
        protocolPolicyId:
          type: [integer, "null"]
          minimum: 1
          description: Rule-level override. Only administrators may set or change this field; other accounts inherit the existing rule, tunnel, or entry-group policy.

    ForwardRuleBatchWrite:
      type: object
      required: [rules]
      properties:
        rules:
          type: array
          minItems: 1
          maxItems: 100
          items: { $ref: "#/components/schemas/ForwardRuleWrite" }

    ForwardRuleBatchResponse:
      type: object
      required: [items, count]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ForwardRule" }
        count: { type: integer, minimum: 0, maximum: 100 }
        preview: { type: boolean }

    ForwardRuleProtocol:
      type: string
      enum: [tcp, udp, tcp_udp]

    ForwardRuleStatus:
      type: string
      enum: [unsynced, syncing, active, paused, disabled, failed, protocol_violation, quota_exhausted]

    ProtocolPolicy:
      description: >
        ProtocolPolicy controls payload or tunnel protocol restrictions. Effective
        policy precedence is forwarding rule, then tunnel, then device group.
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/ProtocolPolicyWrite"

    ProtocolPolicyWrite:
      type: object
      required: [name, template, mode]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        template:
          type: string
          enum: [none, iepl_iplc_no_tls, plain_tcp_only, http_only, block_proxy_like, game_acceleration, authorized_ss, ssh_ops, daily_browsing, normal_forward, strict_compliance, custom]
        purpose:
          type: string
          enum: [gaming, authorized_ss, ssh_ops, daily, normal, strict, custom]
        inspectionLevel:
          type: string
          enum: [off, light, advanced, deep, ndpi]
          default: light
        mode:
          type: string
          enum: [observe, alert, limit, block]
          default: block
        blockTls:
          type: boolean
          default: false
        blockQuic:
          type: boolean
          default: false
        allowPlainTcpOnly:
          type: boolean
          default: false
        allowHttpOnly:
          type: boolean
          default: false
        blockProxyLike:
          type: boolean
          default: false
        blockEncryptedTunnel:
          type: boolean
          default: false
        observationMinutes:
          type: integer
          minimum: 0
        authorizedProtocols:
          type: string
          description: Comma or newline separated authorized protocol names, such as ss or shadowsocks.
        blockedProtocolGroups:
          type: string
          description: Comma or newline separated groups such as proxy, p2p, vpn, remote_access.
        hostAllowlist:
          type: string
        hostBlocklist:
          type: string
        sniAllowlist:
          type: string
        sniBlocklist:
          type: string
        alpnAllowlist:
          type: string
        alpnBlocklist:
          type: string
        tlsNoSniAction:
          $ref: "#/components/schemas/ProtocolAction"
        quicAction:
          $ref: "#/components/schemas/ProtocolAction"
        sshAction:
          $ref: "#/components/schemas/ProtocolAction"
        unknownTcpAction:
          $ref: "#/components/schemas/ProtocolAction"
        unknownUdpAction:
          $ref: "#/components/schemas/ProtocolAction"
        ndpiLowConfidenceAction:
          $ref: "#/components/schemas/ProtocolAction"
        dpiTimeoutMs:
          type: integer
          minimum: 0
        description:
          type: string

    ProtocolAction:
      type: string
      enum: [allow, observe, alert, limit, block]

    ProtocolPolicyEvaluateRequest:
      type: object
      properties:
        policyId:
          type: integer
          minimum: 1
        policy:
          $ref: "#/components/schemas/ProtocolPolicyWrite"
        protocol:
          type: string
        network:
          type: string
          enum: [tcp, udp]
        host:
          type: string
        alpn:
          type: array
          items:
            type: string
        ndpiProtocol:
          type: string
        ndpiCategory:
          type: string
        confidence:
          type: integer
        riskScore:
          type: integer

    ProtocolPolicyEvaluateResponse:
      type: object
      required: [action, reason, matchedRule]
      properties:
        action:
          type: string
          enum: [allow, observe, alert, limit, block]
        reason:
          type: string
        matchedRule:
          type: string
        policy:
          $ref: "#/components/schemas/ProtocolPolicy"

    SpeedLimit:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - $ref: "#/components/schemas/SpeedLimitWrite"

    SpeedLimitWrite:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        tenantId:
          type: [integer, "null"]
          minimum: 1
        userId:
          type: [integer, "null"]
          minimum: 1
        tunnelId:
          type: [integer, "null"]
          minimum: 1
        ruleId:
          type: [integer, "null"]
          minimum: 1
        uploadBps:
          type: integer
          minimum: 0
          format: int64
        downloadBps:
          type: integer
          minimum: 0
          format: int64
        maxConns:
          type: integer
          minimum: 0
        maxIps:
          type: integer
          minimum: 0

    TrafficSample:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [userId, ruleId, nodeId, direction, bytes, sampledAt]
          properties:
            tenantId:
              type: [integer, "null"]
              minimum: 1
            userId:
              type: integer
              minimum: 1
            ruleId:
              type: integer
              minimum: 1
            nodeId:
              type: integer
              minimum: 1
            direction:
              type: string
              enum: [in, out]
            bytes:
              type: integer
              minimum: 0
              format: int64
            sampledAt:
              type: string
              format: date-time

    AuditLog:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [action, resourceType]
          properties:
            actorId:
              type: [integer, "null"]
              minimum: 1
            action:
              type: string
              maxLength: 100
            resourceType:
              type: string
              maxLength: 80
            resourceId:
              type: string
              maxLength: 80
            metadataJson:
              type: string

    AgentEvent:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [nodeId, type, severity, status, occurredAt]
          properties:
            nodeId:
              type: integer
              minimum: 1
            type:
              type: string
            severity:
              type: string
              enum: [info, warning, error]
            status:
              type: string
            message:
              type: string
            detailJson:
              type: string
            occurredAt:
              type: string
              format: date-time

    InstallToken:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [deviceGroupId, expiresAt]
          properties:
            label:
              type: string
              maxLength: 120
            deviceGroupId:
              type: integer
              minimum: 1
            expiresAt:
              type: string
              format: date-time
            usedAt:
              type: [string, "null"]
              format: date-time

    InstallTokenCreate:
      type: object
      required: [deviceGroupId]
      properties:
        label:
          type: string
          maxLength: 120
        deviceGroupId:
          type: integer
          minimum: 1
        ttlHours:
          type: integer
          minimum: 1
          default: 24

    InstallTokenCreateResponse:
      type: object
      required: [installToken, token, command]
      properties:
        installToken:
          $ref: "#/components/schemas/InstallToken"
        token:
          type: string
          description: Plain install token, returned once.
        command:
          type: string
          description: Shell command for installing a node.

    ProtocolViolation:
      allOf:
        - $ref: "#/components/schemas/BaseModel"
        - type: object
          required: [ruleId, nodeId, policyId, protocol, action, occurredAt]
          properties:
            ruleId:
              type: integer
              minimum: 1
            nodeId:
              type: integer
              minimum: 1
            policyId:
              type: integer
              minimum: 1
            protocol:
              type: string
              maxLength: 60
            sourceIp:
              type: string
              maxLength: 120
            action:
              type: string
              enum: [observe, alert, limit, block]
            detail:
              type: string
              description: JSON text with runtime protocol metadata such as reason, host, alpn, detector, confidence, riskScore, ndpiProtocol, ndpiCategory, ruleId, tunnelId, clientAddr, and source (tcp_runtime or udp_runtime).
            occurredAt:
              type: string
              format: date-time

    ProtocolViolationCreate:
      type: object
      required: [ruleId, policyId, protocol]
      properties:
        ruleId:
          type: integer
          minimum: 1
        policyId:
          type: integer
          minimum: 1
        protocol:
          type: string
          maxLength: 60
        sourceIp:
          type: string
          maxLength: 120
        action:
          type: string
          enum: [observe, alert, limit, block]
          default: block
        detail:
          type: string
          description: JSON text with runtime protocol metadata such as reason, host, alpn, detector, confidence, riskScore, ndpiProtocol, ndpiCategory, ruleId, tunnelId, clientAddr, and source (tcp_runtime or udp_runtime).

    Dashboard:
      type: object
      required:
        - users
        - nodes
        - onlineNodes
        - forwardRules
        - todayBytes
        - violations24h
        - recentViolations
        - recentRules
      properties:
        users:
          type: integer
          minimum: 0
        nodes:
          type: integer
          minimum: 0
        onlineNodes:
          type: integer
          minimum: 0
        forwardRules:
          type: integer
          minimum: 0
        todayBytes:
          type: integer
          minimum: 0
          format: int64
        violations24h:
          type: integer
          minimum: 0
        recentViolations:
          type: array
          items:
            $ref: "#/components/schemas/ProtocolViolation"
        recentRules:
          type: array
          items:
            $ref: "#/components/schemas/ForwardRule"

    AgentRegisterRequest:
      type: object
      required: [installToken]
      properties:
        installToken:
          type: string
        name:
          type: string
          maxLength: 120
        uuid:
          type: string
          maxLength: 80
        version:
          type: string
          maxLength: 80
        publicIp:
          type: string
          maxLength: 80
        connectHost:
          type: string
          maxLength: 160
        capabilities:
          type: array
          items:
            type: string

    AgentRegisterResponse:
      type: object
      required: [nodeId, nodeToken, uuid]
      properties:
        nodeId:
          type: integer
          minimum: 1
        nodeToken:
          type: string
        uuid:
          type: string

    AgentHeartbeatRequest:
      type: object
      required: [version, appliedRevision]
      properties:
        version:
          type: string
          maxLength: 80
        publicIp:
          type: string
          maxLength: 80
        connectHost:
          type: string
          maxLength: 160
        appliedRevision:
          type: integer
          format: int64
        capabilities:
          type: array
          items:
            type: string
        system:
          type: object
          additionalProperties: true

    AgentHeartbeatResponse:
      type: object
      required: [desiredRevision, serverTime]
      properties:
        desiredRevision:
          type: integer
          format: int64
        serverTime:
          type: string
          format: date-time
        command:
          $ref: "#/components/schemas/AgentCommand"

    AgentCommand:
      type: object
      required: [id, action]
      properties:
        id:
          type: string
        action:
          type: string
          enum: [uninstall]
        reason:
          type: string
        requestedAt:
          type: string
          format: date-time

    AgentCommandAck:
      type: object
      properties:
        status:
          type: string
          enum: [accepted, done, failed]
          default: accepted
        message:
          type: string

    AgentConfig:
      type: object
      required:
        - node
        - deviceGroup
        - tunnels
        - forwardRules
        - protocolPolicies
        - speedLimits
        - lineProbes
        - revision
        - nonce
        - generatedAt
        - validUntil
      properties:
        node:
          $ref: "#/components/schemas/Node"
        deviceGroup:
          $ref: "#/components/schemas/DeviceGroup"
        tunnels:
          type: array
          items:
            $ref: "#/components/schemas/Tunnel"
        forwardRules:
          type: array
          items:
            $ref: "#/components/schemas/ForwardRule"
        protocolPolicies:
          type: array
          items:
            $ref: "#/components/schemas/ProtocolPolicy"
        speedLimits:
          type: array
          items:
            $ref: "#/components/schemas/SpeedLimit"
        lineProbes:
          type: array
          items:
            $ref: "#/components/schemas/LineProbe"
        revision:
          type: integer
          format: int64
        nonce:
          type: string
          description: Stable nonce for this node and revision, echoed by AgentConfigAck.
        generatedAt:
          type: string
          format: date-time
        validUntil:
          type: string
          format: date-time
          description: Lease expiry. The agent stops listeners if it cannot refresh configuration before this time.

    AgentConfigAck:
      type: object
      required: [revision, nonce, status]
      properties:
        revision:
          type: integer
          format: int64
        nonce:
          type: string
        status:
          type: string
          enum: [applied, rejected, rolled_back, lease_expired]
        message:
          type: string
        runtime:
          type: object
          additionalProperties: true

    AgentProbeReport:
      type: object
      required: [probeId, revision, success, latencyMs]
      properties:
        probeId: { type: integer, minimum: 1 }
        revision: { type: integer, format: int64 }
        success: { type: boolean }
        latencyMs: { type: number, minimum: 0 }
        error: { type: string }

    AgentTrafficRequest:
      type: object
      required: [samples]
      properties:
        samples:
          type: array
          items:
            type: object
            required: [ruleId]
            properties:
              ruleId:
                type: integer
                minimum: 1
              inBytes:
                type: integer
                minimum: 0
                format: int64
              outBytes:
                type: integer
                minimum: 0
                format: int64

    AcceptedResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: integer
          minimum: 0

    ForwardingRuleBundle:
      type: object
      description: Portable forwarding-rule import/export bundle.
      required: [schemaVersion, rules]
      properties:
        schemaVersion:
          type: string
          const: dusheng.forwarding-rules.v1
        exportedAt:
          type: string
          format: date-time
        source:
          type: object
          properties:
            panelUrl:
              type: string
              format: uri
            panelVersion:
              type: string
        protocolPolicies:
          type: array
          items:
            $ref: "#/components/schemas/ProtocolPolicyWrite"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/ForwardingRuleImportItem"

    ForwardingRuleImportItem:
      type: object
      required: [name, protocol, remoteHost, remotePort]
      properties:
        id:
          type: integer
          minimum: 1
          description: Optional source-side ID retained only for audit or diff tools.
        userId:
          type: integer
          minimum: 1
        username:
          type: string
        tunnelId:
          type: integer
          minimum: 1
        tunnelName:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 120
        protocol:
          $ref: "#/components/schemas/ForwardRuleProtocol"
        listenPort:
          type: integer
          minimum: 0
          maximum: 65535
        remoteHost:
          type: string
          minLength: 1
          maxLength: 255
        remotePort:
          type: integer
          minimum: 1
          maximum: 65535
        strategy:
          type: string
          enum: [least_conn, round_robin, random, source_hash]
        protocolPolicyId:
          type: integer
          minimum: 1
        protocolPolicyName:
          type: string
        status:
          $ref: "#/components/schemas/ForwardRuleStatus"
        revision:
          type: integer
          format: int64
        metadata:
          type: object
          additionalProperties: true
