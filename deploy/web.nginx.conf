server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /agent-installer.sh {
    default_type text/x-shellscript;
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location ~ ^/downloads/v[0-9A-Za-z][0-9A-Za-z._-]*/(dusheng-agent-linux-(amd64|arm64)\.tar\.gz|checksums\.txt)$ {
    default_type application/octet-stream;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location /downloads/ {
    return 404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
