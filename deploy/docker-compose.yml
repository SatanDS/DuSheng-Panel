services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dusheng}
      POSTGRES_USER: ${POSTGRES_USER:-dusheng}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-dusheng}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    image: dusheng-panel/api:local
    restart: unless-stopped
    environment:
      DUSHENG_LISTEN: 0.0.0.0:18888
      DUSHENG_DATABASE_URL: host=postgres user=${POSTGRES_USER:-dusheng} password=${POSTGRES_PASSWORD:-change-me-dusheng} dbname=${POSTGRES_DB:-dusheng} port=5432 sslmode=disable TimeZone=Asia/Taipei
      DUSHENG_ENV: ${DUSHENG_ENV:-production}
      DUSHENG_JWT_SECRET: ${DUSHENG_JWT_SECRET:-change-me-in-production}
      DUSHENG_ADMIN_USERNAME: ${DUSHENG_ADMIN_USERNAME:-admin_user}
      DUSHENG_ADMIN_PASSWORD: ${DUSHENG_ADMIN_PASSWORD:-admin_user}
      DUSHENG_PUBLIC_URL: ${DUSHENG_PUBLIC_URL:-http://127.0.0.1:7070}
      DUSHENG_CORS_ORIGINS: ${DUSHENG_CORS_ORIGINS:-http://127.0.0.1:7070}
      DUSHENG_AGENT_RELEASE_BASE: ${DUSHENG_AGENT_RELEASE_BASE:-https://github.com/SatanDS/DuSheng-Panel/releases/latest/download}
      TZ: ${TZ:-Asia/Taipei}
    volumes:
      - api-data:/app/data
    expose:
      - "18888"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    image: dusheng-panel/web:local
    restart: unless-stopped
    volumes:
      - ${DUSHENG_DOWNLOADS_DIR:-./downloads}:/usr/share/nginx/html/downloads:ro
    expose:
      - "8080"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DUSHENG_SITE_ADDRESS: ${DUSHENG_SITE_ADDRESS:-:80}
    ports:
      - "${HTTP_PORT:-7070}:80"
      - "${HTTPS_PORT:-7443}:443"
    volumes:
      - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web

  prometheus:
    image: prom/prometheus:v3.4.2
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-19091}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - api

volumes:
  postgres-data:
  api-data:
  caddy-data:
  caddy-config:
  prometheus-data:
