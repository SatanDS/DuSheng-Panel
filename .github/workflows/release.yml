name: Release Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build linux-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: false
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build release archive
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          work="release/dusheng-agent-linux-${ARCH}"
          mkdir -p "$work"
          CGO_ENABLED=0 GOOS=linux GOARCH="$ARCH" go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "$work/dusheng-agent" ./apps/agent/cmd/agent
          docker buildx build --platform "linux/${ARCH}" \
            --build-arg "VERSION=${VERSION}" \
            --output "type=local,dest=${work}" \
            -f deploy/dpi-release.Dockerfile .
          tar -C "$work" -czf "release/dusheng-agent-linux-${ARCH}.tar.gz" \
            dusheng-agent dusheng-dpi dusheng-dpi-lib THIRD_PARTY_NOTICES.md
      - uses: actions/upload-artifact@v4
        with:
          name: dusheng-agent-linux-${{ matrix.arch }}
          path: release/dusheng-agent-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dusheng-agent-linux-*
          path: release
          merge-multiple: true
      - name: Generate checksums
        run: cd release && sha256sum dusheng-agent-linux-*.tar.gz > checksums.txt
      - uses: anchore/sbom-action/download-syft@v0.20.6
      - name: Generate CycloneDX SBOMs
        shell: bash
        run: |
          set -euo pipefail
          for archive in release/dusheng-agent-linux-*.tar.gz; do
            syft scan "$archive" -o "cyclonedx-json=${archive}.sbom.cdx.json"
          done
      - uses: sigstore/cosign-installer@v3.9.2
      - name: Sign release assets with GitHub OIDC
        shell: bash
        run: |
          set -euo pipefail
          for asset in release/dusheng-agent-linux-*.tar.gz release/checksums.txt; do
            cosign sign-blob --yes --bundle "${asset}.sigstore.json" "$asset"
          done
      - uses: softprops/action-gh-release@v2
        with:
          name: DuSheng Panel ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/dusheng-agent-linux-amd64.tar.gz
            release/dusheng-agent-linux-arm64.tar.gz
            release/checksums.txt
            release/dusheng-agent-linux-amd64.tar.gz.sbom.cdx.json
            release/dusheng-agent-linux-arm64.tar.gz.sbom.cdx.json
            release/dusheng-agent-linux-amd64.tar.gz.sigstore.json
            release/dusheng-agent-linux-arm64.tar.gz.sigstore.json
            release/checksums.txt.sigstore.json
